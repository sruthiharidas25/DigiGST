/* ── AI call (key stored in memory only) ── */
window.__APIKEY = window.__APIKEY || "";

async function callAI(messages){
  if(!window.__APIKEY){
    throw new Error("NO_KEY");
  }
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": window.__APIKEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:`You are the DigiGST AI assistant — a senior GST compliance expert embedded inside the DigiGST platform for ${COMPANY}.

You have FULL ACCESS to the company's live GST data (returns, ITC ledger, IMS records, anomalies, due dates). Use this data to give specific, accurate, actionable answers. Never say you don't have access to data.

RESPONSE RULES:
- Always reference specific numbers, supplier names, return types, and dates from the data
- Be conversational but precise — like a CA who knows the file inside out
- Use short paragraphs or bullet points, keep under 180 words
- For urgent issues, lead with the most critical item first
- When recommending actions, be specific: "File GSTR-4 Mar 2024 before 11 May" not "file pending returns"
- Format numbers in Indian style (₹1,97,500 not ₹197500)
- Never make up data that isn't in the context provided

CURRENT DATA CONTEXT:
${buildContext()}`,
      messages
    })
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message||`HTTP ${res.status}`);
  }
  const data=await res.json();
  return data.content?.[0]?.text||"Unable to get response. Please try again.";
}

/* ── Charts ── */
function MonthlyChart(){
  const months=[
    {l:"Feb",tax:292500,taxable:1625000},
    {l:"Mar",tax:331200,taxable:1840000},
  ];
  const maxT=Math.max(...months.map(m=>m.taxable));
  return(
    <div className="bg-white rounded-xl border border-ey-gray-mid p-5">
      <h3 className="text-sm font-semibold text-ey-charcoal mb-1">Monthly Tax Summary</h3>
      <p className="text-xs text-ey-gray-dark mb-5">Feb vs Mar 2024 — tax grew 13.2% MoM</p>
      <div className="flex items-end justify-center gap-10" style={{height:110}}>
        {months.map((m,i)=>(
          <div key={i} className="flex flex-col items-center gap-2">
            <div className="flex items-end gap-1.5" style={{height:90}}>
              <div title={fmt(m.taxable)} style={{width:26,height:`${(m.taxable/maxT)*90}px`,background:"#E8E8E4",borderRadius:"3px 3px 0 0",transition:"height .6s ease"}}></div>
              <div title={fmt(m.tax)} style={{width:26,height:`${(m.tax/Math.max(...months.map(x=>x.tax)))*90}px`,background:"#FFD400",borderRadius:"3px 3px 0 0",transition:"height .6s ease"}}></div>
            </div>
            <span className="text-xs text-ey-gray-dark font-medium">{m.l} 2024</span>
            <span className="text-xs font-bold text-ey-charcoal">{fmt(m.tax)}</span>
          </div>
        ))}
      </div>
      <div className="flex justify-center gap-5 mt-2">
        <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded" style={{background:"#E8E8E4"}}></div><span className="text-xs text-ey-gray-dark">Taxable</span></div>
        <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded bg-ey-yellow"></div><span className="text-xs text-ey-gray-dark">Tax Paid</span></div>
      </div>
    </div>
  );
}

function StatusBreakdown({returns}){
  const c={Filed:0,Pending:0,Processing:0,Error:0,Draft:0};
  returns.forEach(r=>{if(c[r.status]!==undefined)c[r.status]++;});
  const t=returns.length||1;
  return(
    <div className="bg-white rounded-xl border border-ey-gray-mid p-5">
      <h3 className="text-sm font-semibold text-ey-charcoal mb-1">Status Breakdown</h3>
      <p className="text-xs text-ey-gray-dark mb-4">{t} returns in current filter</p>
      {[{l:"Filed",v:c.Filed,col:"bg-green-500"},{l:"Processing",v:c.Processing,col:"bg-blue-400"},{l:"Pending",v:c.Pending,col:"bg-amber-400"},{l:"Error",v:c.Error,col:"bg-red-500"},{l:"Draft",v:c.Draft,col:"bg-gray-300"}].map((b,i)=>(
        <div key={i} className="flex items-center gap-3 mb-2.5">
          <span className="text-xs text-ey-gray-dark w-20">{b.l}</span>
          <div className="flex-1 bg-gray-100 rounded-full h-2">
            <div className={`h-2 rounded-full ${b.col}`} style={{width:`${(b.v/t)*100}%`,transition:"width .5s"}}></div>
          </div>
          <span className="text-xs font-bold text-ey-charcoal w-5 text-right">{b.v}</span>
        </div>
      ))}
    </div>
  );
}

  return(
    <div>
      <div className="grid grid-cols-4 gap-3 mb-5">
        {[{l:"Total",v:data.length},{l:"Filed",v:data.filter(r=>r.status==="Filed").length},{l:"Pending",v:data.filter(r=>["Pending","Error","Draft"].includes(r.status)).length},{l:"Tax",v:fmt(data.reduce((s,r)=>s+r.tax,0))}].map((s,i)=>(
          <div key={i} className="scard"><p className="text-xs text-ey-gray-dark uppercase">{s.l}</p><p className="text-xl font-bold text-ey-charcoal mt-1">{s.v}</p></div>

      <div className="bg-white rounded-xl border border-ey-gray-mid overflow-hidden">

  const tc=data.reduce((s,l)=>s+l.credit,0);

          <div key={i} className="scard"><p className="text-xs text-ey-gray-dark uppercase">{s.l}</p><p className={`text-xl font-bold mt-1 ${s.c}`}>{s.v}</p></div>

          <tbody>{data.map((r,i)=>(

  );
}

function AIPage(){
  const[results,setResults]=useState({});
  const[loading,setLoading]=useState({});
  const analyses=[
    {id:"morning",label:"Today's Action Plan",icon:"☀️",prompt:"What are the top 3 most urgent GST actions for today? Give me a clear action plan with specific return names, amounts, and deadlines. Be like a CA advising me on what to do first thing this morning."},
    {id:"compliance",label:"Compliance Deep-Dive",icon:"📊",prompt:"Do a thorough compliance analysis. What's driving the 87/100 score? What specific issues are pulling it down? What would it take to get to 95+? Give me a 3-point improvement plan."},
    {id:"itc",label:"ITC Optimisation",icon:"💰",prompt:"Analyse our ITC position. Why did the balance drop from ₹2,85,400 (Feb close) to ₹1,97,500 (Mar close)? Are we leaving any ITC on the table? Which pending IMS invoices should I prioritise accepting first?"},
    {id:"risk",label:"Risk Assessment",icon:"⚠️",prompt:"Identify and rank all GST risks for Acme Enterprises. Include the GSTR-3B mismatch, GSTR-4 draft status, pending IMS actions, Rule 42 reversal. Rate each High/Medium/Low and give specific mitigation steps."},
    {id:"forecast",label:"Cash Flow Forecast",icon:"🔮",prompt:"Forecast our GST cash outflow for the next 2 weeks. Tax grew 13.2% MoM. What's the estimated Apr 2024 liability? How much cash should we keep liquid for GST payments? Should we use ITC or pay cash first?"},
    {id:"suppliers",label:"Supplier Risk Report",icon:"🏭",prompt:"Analyse our supplier risk from IMS data. Which supplier is most risky and why? Delhi Chemical Works has 2 rejections — what does that mean for our ITC? Which suppliers should we audit or follow up with immediately?"},
  ];

  async function run(a){
    setLoading(p=>({...p,[a.id]:true}));
    try{
      const r=await callAI([{role:"user",content:a.prompt}]);
      setResults(p=>({...p,[a.id]:r}));
    }catch(e){setResults(p=>({...p,[a.id]:e.message==="NO_KEY"?"⚠️ No API key set. Click the 🔑 button in the chatbot to add your Anthropic API key and unlock live AI analysis.":"⚠️ API Error: "+e.message}));}
    setLoading(p=>({...p,[a.id]:false}));
  }

  return(
    <div>
      <div className="bg-ey-navy rounded-xl p-5 mb-5 flex items-center gap-4">
        <div className="w-12 h-12 bg-ey-yellow rounded-xl flex items-center justify-center text-ey-navy font-bold text-xl">AI</div>
        <div>
          <h2 className="text-white font-semibold">AI-Powered GST Intelligence</h2>
          <p className="text-gray-400 text-sm">Each analysis uses your real company data — returns, IMS, ledger, anomalies · Powered by Claude</p>
        </div>
        <div className="ml-auto flex items-center gap-2"><div className="pulse"></div><span className="text-green-400 text-xs">Live</span></div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
        {analyses.map(a=>(
          <div key={a.id} className="bg-white rounded-xl border border-ey-gray-mid p-5">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2"><span className="text-xl">{a.icon}</span><h3 className="text-sm font-semibold text-ey-charcoal">{a.label}</h3></div>
              <button onClick={()=>run(a)} disabled={loading[a.id]}
                className="text-xs bg-ey-navy text-ey-yellow hover:bg-ey-navy-light disabled:opacity-50 px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1.5">
                {loading[a.id]?<><div className="ai-dot" style={{background:"#FFD400"}}></div><div className="ai-dot" style={{background:"#FFD400"}}></div><div className="ai-dot" style={{background:"#FFD400"}}></div></>:<>✦ Generate</>}
              </button>
            </div>
            {results[a.id]?
              <div className="bg-ey-gray rounded-lg p-3 text-xs text-ey-charcoal leading-relaxed whitespace-pre-wrap border-l-2 border-ey-yellow max-h-48 overflow-y-auto">{results[a.id]}</div>
              :<div className="bg-ey-gray rounded-lg p-4 text-xs text-ey-gray-dark text-center">Click Generate — AI will analyse your actual {COMPANY} data</div>}
          </div>
        ))}
      </div>
      {/* Anomaly table */}
      <div className="bg-white rounded-xl border border-ey-gray-mid overflow-hidden">
        <div className="px-5 py-4 border-b border-ey-gray-mid"><h3 className="text-sm font-semibold text-ey-charcoal">Detected Anomalies</h3></div>
        <table className="w-full text-sm" style={{borderCollapse:"collapse"}}>
          <thead><tr className="bg-ey-gray">{["Type","Description","Period","Severity","Action Required"].map(h=><th key={h} className="text-left px-5 py-3 text-xs font-semibold text-ey-gray-dark uppercase border-b border-ey-gray-mid">{h}</th>)}</tr></thead>
          <tbody>{ANOMALIES.map((a,i)=>(
            <tr key={i} className={`trh border-b border-ey-gray-mid ${a.severity==="High"?"bg-red-50/40":""}`}>
              <td className="px-5 py-3 text-xs font-semibold text-ey-charcoal">{a.type}</td>
              <td className="px-5 py-3 text-xs text-ey-charcoal">{a.desc}</td>
              <td className="px-5 py-3 text-xs text-ey-gray-dark">{a.period}</td>
              <td className="px-5 py-3"><span className={`badge ${a.severity==="High"?"badge-err":a.severity==="Medium"?"badge-pending":"badge-draft"}`}>{a.severity}</span></td>
              <td className="px-5 py-3 text-xs text-ey-gray-dark">{a.action}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   REPORT MODAL
══════════════════════════════════════════ */
function ReportModal({filtered,onClose}){
  const[fmt2,setFmt2]=useState("excel");
  const[scope,setScope]=useState("returns");
  const[done,setDone]=useState(false);
  const[gen,setGen]=useState(false);

  function doExport(){
    setGen(true);
    setTimeout(()=>{
      if(scope==="returns"){
        const rows=filtered.map(r=>({"Return Type":r.type,Period:r.period,Status:r.status,"Taxable Amount":r.taxable,"Tax Amount":r.tax,IGST:r.igst,CGST:r.cgst,SGST:r.sgst,"Last Updated":r.updated,"Filed By":r.by}));
        if(fmt2==="excel")exportXLSX(rows,`DigiGST_Returns_${new Date().toISOString().slice(0,10)}.xlsx`,"Returns");
        else if(fmt2==="csv")exportCSV(rows,`DigiGST_Returns_${new Date().toISOString().slice(0,10)}.csv`);
        else exportPDF("GST Return Register",["Return","Period","Status","Taxable","Tax","IGST","CGST","SGST","Updated","By"],filtered.map(r=>[r.type,r.period,r.status,fmt(r.taxable),fmt(r.tax),fmt(r.igst),fmt(r.cgst),fmt(r.sgst),r.updated,r.by]),`DigiGST_Returns_${new Date().toISOString().slice(0,10)}.pdf`);
      }else if(scope==="ims"){
        const rows=IMS.map(r=>({Supplier:r.supplier,GSTIN:r.gstin,Period:r.period,Invoices:r.invoices,Eligible:r.eligible,Pending:r.pending,Rejected:r.rejected,"ITC Amount":r.itc,Risk:r.risk}));
        if(fmt2==="excel")exportXLSX(rows,"DigiGST_IMS.xlsx","IMS");
        else if(fmt2==="csv")exportCSV(rows,"DigiGST_IMS.csv");
        else exportPDF("IMS Report",["Supplier","GSTIN","Period","Invoices","Eligible","Pending","Rejected","ITC","Risk"],IMS.map(r=>[r.supplier,r.gstin,r.period,r.invoices,r.eligible,r.pending,r.rejected,fmt(r.itc),r.risk]),"DigiGST_IMS.pdf");
      }else{
        const rows=LEDGER.map(r=>({Date:r.date,Description:r.desc,Type:r.type,Debit:r.debit,Credit:r.credit,Balance:r.balance}));
        if(fmt2==="excel")exportXLSX(rows,"DigiGST_Ledger.xlsx","Ledger");
        else if(fmt2==="csv")exportCSV(rows,"DigiGST_Ledger.csv");
        else exportPDF("Credit Ledger",["Date","Description","Type","Debit","Credit","Balance"],LEDGER.map(r=>[r.date,r.desc,r.type,r.debit>0?fmt(r.debit):"—",r.credit>0?fmt(r.credit):"—",fmt(r.balance)]),"DigiGST_Ledger.pdf");
      }
      setGen(false);setDone(true);
    },900);
  }

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="bg-white rounded-2xl p-8 w-full max-w-lg mx-4 shadow-2xl" onClick={e=>e.stopPropagation()}>
        {!done?(
          <>
            <div className="flex items-center gap-3 mb-6">
              <div className="w-12 h-12 bg-ey-yellow-light rounded-xl flex items-center justify-center text-2xl">📥</div>
              <div><h3 className="text-lg font-semibold text-ey-charcoal">Generate Report</h3><p className="text-sm text-ey-gray-dark">Download real data as Excel, PDF or CSV</p></div>
            </div>
            <div className="mb-5">
              <p className="text-xs font-semibold text-ey-gray-dark uppercase tracking-wide mb-2">Report Scope</p>
              <div className="grid grid-cols-3 gap-2">
                {[{v:"returns",l:"Return Register",i:"📋"},{v:"ims",l:"IMS Report",i:"📈"},{v:"ledger",l:"Ledger",i:"📒"}].map(o=>(
                  <button key={o.v} onClick={()=>setScope(o.v)} className={`p-3 rounded-xl border text-xs font-medium flex flex-col items-center gap-1 transition-all ${scope===o.v?"border-ey-yellow bg-ey-yellow-pale":"border-ey-gray-mid text-ey-gray-dark hover:border-yellow-300"}`}>
                    <span className="text-xl">{o.i}</span>{o.l}
                  </button>
                ))}
              </div>
            </div>
            <div className="mb-6">
              <p className="text-xs font-semibold text-ey-gray-dark uppercase tracking-wide mb-2">Format</p>
              <div className="flex gap-3">
                {[{v:"excel",l:"Excel .xlsx",i:"🟢"},{v:"pdf",l:"PDF",i:"🔴"},{v:"csv",l:"CSV",i:"🔵"}].map(f=>(
                  <button key={f.v} onClick={()=>setFmt2(f.v)} className={`flex-1 py-2.5 rounded-lg border text-xs font-semibold flex items-center justify-center gap-2 transition-all ${fmt2===f.v?"border-ey-yellow bg-ey-yellow text-ey-navy":"border-ey-gray-mid text-ey-gray-dark hover:bg-ey-gray"}`}>
                    <span>{f.i}</span>{f.l}
                  </button>
                ))}
              </div>
            </div>
            <div className="bg-ey-gray rounded-xl p-4 mb-6 grid grid-cols-2 gap-3">
              <div><span className="text-ey-gray-dark text-xs block">Company</span><span className="font-medium text-ey-charcoal text-xs">{COMPANY}</span></div>
              <div><span className="text-ey-gray-dark text-xs block">GSTIN</span><span className="font-mono text-ey-charcoal text-xs">{GSTIN}</span></div>
              <div><span className="text-ey-gray-dark text-xs block">Records</span><span className="font-medium text-ey-charcoal text-xs">{scope==="returns"?filtered.length:scope==="ims"?IMS.length:LEDGER.length} rows</span></div>
              <div><span className="text-ey-gray-dark text-xs block">Date</span><span className="font-medium text-ey-charcoal text-xs">{new Date().toLocaleDateString("en-IN")}</span></div>
            </div>
            <div className="flex gap-3">
              <button onClick={doExport} disabled={gen} className="flex-1 bg-ey-yellow hover:bg-ey-yellow-dark disabled:opacity-60 text-ey-navy font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                {gen?<><div className="ai-dot" style={{background:"#1A1A2E"}}></div><div className="ai-dot" style={{background:"#1A1A2E"}}></div><div className="ai-dot" style={{background:"#1A1A2E"}}></div></>:<>⬇ Download {fmt2.toUpperCase()}</>}
              </button>
              <button onClick={onClose} className="px-5 border border-ey-gray-mid text-ey-charcoal font-medium py-3 rounded-xl text-sm hover:bg-ey-gray">Cancel</button>
            </div>
          </>
        ):(
          <div className="text-center py-6">
            <div className="text-5xl mb-4">✅</div>
            <h3 className="text-lg font-semibold text-ey-charcoal mb-2">Downloaded Successfully</h3>
            <p className="text-sm text-ey-gray-dark mb-6">Your {fmt2.toUpperCase()} report has been saved.</p>
            <button onClick={onClose} className="bg-ey-yellow text-ey-navy font-semibold px-8 py-2.5 rounded-xl">Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
